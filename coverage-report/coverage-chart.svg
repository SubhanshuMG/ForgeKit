<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 550 214" width="550" height="214">
  <defs>
    <linearGradient id="header-line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#00ff88" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
  <style>
    .title { font: 700 13px system-ui,-apple-system,sans-serif; fill: #e2e8f0; text-transform: uppercase; letter-spacing: 0.08em; }
    .title-accent { fill: #00d4ff; }
    .label { font: 500 11.5px system-ui,-apple-system,sans-serif; fill: #8b949e; text-anchor: end; dominant-baseline: middle; }
    .pending { font: 500 11px system-ui,-apple-system,sans-serif; fill: #484f58; dominant-baseline: middle; }
    .note { font: 400 11px system-ui,-apple-system,sans-serif; fill: #6e7681; }
  </style>
  <rect width="100%" height="100%" fill="#0C1117" rx="12"/>
  <text x="22" y="30" class="title"><tspan class="title-accent">Coverage</tspan> Summary</text>
  <line x1="22" y1="44" x2="528" y2="44" stroke="url(#header-line)" stroke-width="1.5"/>
  <!-- Lines -->
  <g>
    <text x="100" y="77" class="label">Lines</text>
    <rect x="110" y="63" width="280" height="28" fill="#161b22" rx="6" stroke="#21262d" stroke-width="0.5"/>
    <text x="400" y="77" class="pending">awaiting first CI run</text>
  </g>
  <!-- Statements -->
  <g>
    <text x="100" y="119" class="label">Statements</text>
    <rect x="110" y="105" width="280" height="28" fill="#161b22" rx="6" stroke="#21262d" stroke-width="0.5"/>
    <text x="400" y="119" class="pending">—</text>
  </g>
  <!-- Branches -->
  <g>
    <text x="100" y="161" class="label">Branches</text>
    <rect x="110" y="147" width="280" height="28" fill="#161b22" rx="6" stroke="#21262d" stroke-width="0.5"/>
    <text x="400" y="161" class="pending">—</text>
  </g>
  <!-- Functions -->
  <g>
    <text x="100" y="203" class="label">Functions</text>
    <rect x="110" y="189" width="280" height="28" fill="#161b22" rx="6" stroke="#21262d" stroke-width="0.5"/>
    <text x="400" y="203" class="pending">—</text>
  </g>
</svg>
