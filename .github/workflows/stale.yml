name: Close Stale Issues

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9am UTC
  workflow_dispatch:

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not had
            any activity in 60 days. It will be closed in 14 days unless there is
            further activity. If this is still relevant, please comment or add the
            `keep-open` label.
          close-issue-message: >
            This issue has been closed due to inactivity. If you believe it is still
            relevant, please open a new issue and reference this one.
          stale-pr-message: >
            This pull request has been automatically marked as stale because it has
            not had any activity in 30 days. It will be closed in 14 days unless
            there is further activity.
          close-pr-message: >
            This pull request has been closed due to inactivity. Feel free to reopen
            if you would like to continue working on it.
          days-before-issue-stale: 60
          days-before-issue-close: 14
          days-before-pr-stale: 30
          days-before-pr-close: 14
          exempt-issue-labels: 'keep-open,pinned,security,trademark-violation'
          exempt-pr-labels: 'keep-open,pinned'
          stale-issue-label: 'stale'
          stale-pr-label: 'stale'
