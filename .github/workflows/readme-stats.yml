name: Readme Stats

on:
  schedule:
    # Every Monday at 9am UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

# Commit the updated stats file back to main
permissions:
  contents: write

jobs:
  fetch-stats:
    name: Fetch npm Download Stats
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Only run on the main branch (schedule always targets default, but
    # workflow_dispatch can be triggered from any branch)
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Fetch weekly downloads
        id: weekly
        run: |
          RESPONSE=$(curl -sf "https://api.npmjs.org/downloads/point/last-week/forgekit-cli")
          COUNT=$(echo "$RESPONSE" | jq '.downloads')
          echo "count=$COUNT" >> $GITHUB_OUTPUT

      - name: Fetch monthly downloads
        id: monthly
        run: |
          RESPONSE=$(curl -sf "https://api.npmjs.org/downloads/point/last-month/forgekit-cli")
          COUNT=$(echo "$RESPONSE" | jq '.downloads')
          echo "count=$COUNT" >> $GITHUB_OUTPUT

      - name: Write stats file
        env:
          WEEKLY: ${{ steps.weekly.outputs.count }}
          MONTHLY: ${{ steps.monthly.outputs.count }}
        run: |
          UPDATED=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          mkdir -p .github
          cat > .github/npm-stats.json <<EOF
          {
            "weekly": ${WEEKLY},
            "monthly": ${MONTHLY},
            "updated": "$UPDATED"
          }
          EOF

      - name: Commit updated stats
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: update npm download stats [skip ci]'
          file_pattern: .github/npm-stats.json
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com
