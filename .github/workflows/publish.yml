name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    name: Publish forgekit-cli to npm
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --workspaces
      - name: Build
        run: npm run build --workspace=packages/cli
      - name: Run tests
        run: npm test --workspace=packages/cli
      - name: Publish CLI to npm
        run: npm publish --workspace=packages/cli --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Generate SBOM
        run: npm sbom --workspace=packages/cli --sbom-format cyclonedx > forgekit-cli-sbom.json
      - name: Attach SBOM to GitHub Release
        run: gh release upload ${{ github.event.release.tag_name }} forgekit-cli-sbom.json --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
