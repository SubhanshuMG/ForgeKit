name: Release Announcement

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to announce (e.g. v0.5.0)'
        required: true

permissions:
  contents: read

jobs:
  tweet:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: vars.TWITTER_POSTING_ENABLED == 'true'
    steps:
      - name: Post to X/Twitter
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          EVENT_TAG: ${{ github.event.release.tag_name }}
          EVENT_URL: ${{ github.event.release.html_url }}
          EVENT_BODY: ${{ github.event.release.body }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          pip install requests-oauthlib --quiet

          python3 << 'PYEOF'
          import os, json, subprocess
          from requests_oauthlib import OAuth1Session

          api_key = os.environ["TWITTER_API_KEY"]
          api_secret = os.environ["TWITTER_API_SECRET"]
          access_token = os.environ["TWITTER_ACCESS_TOKEN"]
          access_secret = os.environ["TWITTER_ACCESS_SECRET"]

          repo = os.environ["GH_REPO"]

          # Support both release event and manual dispatch
          version = os.environ.get("EVENT_TAG") or os.environ.get("INPUT_TAG", "")
          url = os.environ.get("EVENT_URL") or ""
          body = os.environ.get("EVENT_BODY") or ""

          # If manual dispatch, fetch release info via gh CLI
          if not url and version:
              try:
                  result = subprocess.run(
                      ["gh", "release", "view", version, "--repo", repo, "--json", "htmlUrl,body"],
                      capture_output=True, text=True
                  )
                  if result.returncode == 0:
                      data = json.loads(result.stdout)
                      url = data.get("htmlUrl", f"https://github.com/{repo}/releases/tag/{version}")
                      body = data.get("body", "")
              except Exception:
                  url = f"https://github.com/{repo}/releases/tag/{version}"

          if not version:
              print("::error::No release tag provided")
              exit(1)

          # Extract bullet points from release body (skip headers/blank lines)
          bullets = [l.strip().lstrip("- ").replace("`", "").split(" — ")[0].split(": ")[0]
                     for l in body.split("\n")
                     if l.strip().startswith("- ") and not l.strip().startswith("- X/") and not l.strip().startswith("- npm ")]
          top = bullets[:3]
          highlights = "\n".join(f"- {b}" for b in top) if top else ""

          parts = [
              f"ForgeKit {version} just dropped!",
              "",
              "One CLI to scaffold any stack in seconds.",
              "",
              highlights,
              "",
              "npx forgekit-cli new my-app",
              "",
              url,
              "#ForgeKit #OpenSource #DevTools",
          ]
          tweet = "\n".join(parts)

          # Enforce 280 char limit by trimming highlights
          while len(tweet) > 280 and top:
              top.pop()
              highlights = "\n".join(f"- {b}" for b in top) if top else ""
              parts[4] = highlights
              tweet = "\n".join(parts)

          # Clean up indentation
          tweet = "\n".join(line.strip() for line in tweet.strip().split("\n"))

          session = OAuth1Session(
              api_key,
              client_secret=api_secret,
              resource_owner_key=access_token,
              resource_owner_secret=access_secret,
          )

          resp = session.post(
              "https://api.twitter.com/2/tweets",
              json={"text": tweet},
          )

          if resp.status_code in (200, 201):
              data = resp.json()
              tweet_id = data.get("data", {}).get("id", "unknown")
              print(f"Tweet posted successfully! ID: {tweet_id}")
          else:
              print(f"::error::Failed to post tweet. Status: {resp.status_code} Body: {resp.text}")
              exit(1)
          PYEOF

  log-release:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'release'
    steps:
      - name: Log release info
        run: |
          echo "## Release ${{ github.event.release.tag_name }} published" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tag:** ${{ github.event.release.tag_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **URL:** ${{ github.event.release.html_url }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Author:** ${{ github.event.release.author.login }}" >> "$GITHUB_STEP_SUMMARY"
