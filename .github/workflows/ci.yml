name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-cli:
    name: Test CLI
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --workspaces
      - name: Lint
        run: npm run lint --workspace=packages/cli
      - name: Type check
        run: npx tsc --noEmit --project packages/cli/tsconfig.json
      - name: Run tests
        run: npm test --workspace=packages/cli -- --coverage --coverageReporters=text --coverageReporters=lcov
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.node-version }}
          path: packages/cli/coverage/
          if-no-files-found: warn
      - name: Build
        run: npm run build --workspace=packages/cli

  smoke-test:
    name: Smoke Test (scaffold runs)
    needs: test-cli
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      - name: Install
        run: npm ci --workspaces
      - name: Build CLI
        run: npm run build --workspace=packages/cli
      - name: Smoke test, web-app template
        run: |
          node packages/cli/dist/index.js new smoke-web --template web-app --skip-install --dir /tmp
          test -f /tmp/smoke-web/package.json && echo "PASS: web-app scaffold" || (echo "FAIL: web-app scaffold" && exit 1)
      - name: Smoke test, api-service template
        run: |
          node packages/cli/dist/index.js new smoke-api --template api-service --skip-install --dir /tmp
          test -f /tmp/smoke-api/requirements.txt && echo "PASS: api-service scaffold" || (echo "FAIL" && exit 1)
      - name: Smoke test, ml-pipeline template
        run: |
          node packages/cli/dist/index.js new smoke-ml --template ml-pipeline --skip-install --dir /tmp
          test -f /tmp/smoke-ml/requirements.txt && echo "PASS: ml-pipeline scaffold" || (echo "FAIL" && exit 1)
      - name: Smoke test, next-app template
        run: |
          node packages/cli/dist/index.js new smoke-next --template next-app --skip-install --dir /tmp
          test -f /tmp/smoke-next/package.json && echo "PASS: next-app scaffold" || (echo "FAIL: next-app scaffold" && exit 1)
      - name: Smoke test, go-api template
        run: |
          node packages/cli/dist/index.js new smoke-go --template go-api --skip-install --dir /tmp
          test -f /tmp/smoke-go/main.go && echo "PASS: go-api scaffold" || (echo "FAIL: go-api scaffold" && exit 1)
      - name: Smoke test, serverless template
        run: |
          node packages/cli/dist/index.js new smoke-sls --template serverless --skip-install --dir /tmp
          test -f /tmp/smoke-sls/serverless.yml && echo "PASS: serverless scaffold" || (echo "FAIL: serverless scaffold" && exit 1)

  integration-test:
    name: Integration Tests (full install + build per template)
    needs: [smoke-test]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: false
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install npm workspaces
        run: npm ci --workspaces

      - name: Build CLI
        run: npm run build --workspace=packages/cli

      - name: Integration test, web-app template
        run: |
          node packages/cli/dist/index.js new int-web --template web-app --skip-install --dir /tmp
          cd /tmp/int-web
          npm install
          npm run build
          echo "PASS: web-app integration"

      - name: Integration test, api-service template
        run: |
          node packages/cli/dist/index.js new int-api --template api-service --skip-install --dir /tmp
          cd /tmp/int-api
          pip install -r requirements.txt
          python -c "from main import app; print('PASS: api-service integration')"

      - name: Integration test, ml-pipeline template
        run: |
          node packages/cli/dist/index.js new int-ml --template ml-pipeline --skip-install --dir /tmp
          cd /tmp/int-ml
          pip install -r requirements.txt
          python -m pytest tests/ -q -p no:asyncio
          echo "PASS: ml-pipeline integration"

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      - name: Install
        run: npm ci --workspaces
      - name: Audit dependencies
        run: npm audit --audit-level=high --workspaces
      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
