<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <linearGradient id="accent-glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g stroke="#1a1a1a" stroke-width="1" opacity="0.6">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
  </g>

  <!-- Left accent glow -->
  <rect x="0" y="0" width="500" height="640" fill="url(#accent-glow)"/>

  <!-- Left border accent line -->
  <rect x="0" y="0" width="4" height="640" fill="#00d4ff" opacity="0.8"/>

  <!-- Logo area -->
  <text x="80" y="200" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="52" font-weight="800" fill="#00d4ff">⚡ ForgeKit</text>

  <!-- Tagline -->
  <text x="80" y="264" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="400" fill="#999999">Engineering acceleration for AI, DevOps, and full-stack teams</text>

  <!-- Divider -->
  <rect x="80" y="300" width="480" height="1" fill="#262626"/>

  <!-- Terminal window -->
  <rect x="80" y="328" width="580" height="200" rx="10" fill="#111111" stroke="#262626" stroke-width="1"/>

  <!-- Terminal header -->
  <rect x="80" y="328" width="580" height="36" rx="10" fill="#1a1a1a"/>
  <rect x="80" y="348" width="580" height="16" fill="#1a1a1a"/>
  <circle cx="108" cy="346" r="6" fill="#ff5f57"/>
  <circle cx="128" cy="346" r="6" fill="#ffbd2e"/>
  <circle cx="148" cy="346" r="6" fill="#28ca42"/>
  <text x="200" y="351" font-family="'Fira Code', 'Cascadia Code', monospace" font-size="12" fill="#555555">forgekit</text>

  <!-- Terminal content -->
  <text x="104" y="390" font-family="'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#555555">$</text>
  <text x="120" y="390" font-family="'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#ffffff">npx forgekit-cli new my-app</text>

  <text x="104" y="418" font-family="'Fira Code', 'Cascadia Code', monospace" font-size="13" fill="#00d4ff">  ForgeKit, Engineering Acceleration Platform</text>

  <text x="104" y="445" font-family="'Fira Code', 'Cascadia Code', monospace" font-size="13" fill="#999999">  ? Choose a template:</text>
  <text x="104" y="468" font-family="'Fira Code', 'Cascadia Code', monospace" font-size="13" fill="#00ff88">  > web-app   Web App (Node + React)</text>
  <text x="104" y="491" font-family="'Fira Code', 'Cascadia Code', monospace" font-size="13" fill="#555555">    api-service   API Service (Python + FastAPI)</text>
  <text x="104" y="514" font-family="'Fira Code', 'Cascadia Code', monospace" font-size="13" fill="#555555">    ml-pipeline   ML Pipeline (Python + Jupyter)</text>

  <!-- Right side: feature bullets -->
  <text x="740" y="200" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" font-weight="600" fill="#555555">SCAFFOLD IN SECONDS</text>

  <!-- Feature rows -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18">
    <text x="740" y="250" fill="#00ff88">✓</text>
    <text x="768" y="250" fill="#cccccc">Node + React + TypeScript</text>

    <text x="740" y="288" fill="#00ff88">✓</text>
    <text x="768" y="288" fill="#cccccc">Python + FastAPI + PostgreSQL</text>

    <text x="740" y="326" fill="#00ff88">✓</text>
    <text x="768" y="326" fill="#cccccc">Python + Jupyter + MLflow</text>

    <text x="740" y="364" fill="#00ff88">✓</text>
    <text x="768" y="364" fill="#cccccc">CI/CD wired from day one</text>

    <text x="740" y="402" fill="#00ff88">✓</text>
    <text x="768" y="402" fill="#cccccc">Dockerfile + docker-compose</text>

    <text x="740" y="440" fill="#00ff88">✓</text>
    <text x="768" y="440" fill="#cccccc">Security sandbox + secret scan</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="580" width="1280" height="60" fill="#0d0d0d"/>
  <rect x="0" y="580" width="1280" height="1" fill="#1e1e1e"/>

  <!-- Bottom badges -->
  <rect x="80" y="600" width="120" height="24" rx="4" fill="#1a1a1a" stroke="#262626" stroke-width="1"/>
  <text x="140" y="616" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="12" fill="#999999">Apache 2.0</text>

  <rect x="212" y="600" width="80" height="24" rx="4" fill="#1a1a1a" stroke="#262626" stroke-width="1"/>
  <text x="252" y="616" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="12" fill="#999999">TypeScript</text>

  <rect x="304" y="600" width="100" height="24" rx="4" fill="rgba(0,212,255,0.1)" stroke="#00d4ff" stroke-width="1" opacity="0.6"/>
  <text x="354" y="616" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="12" fill="#00d4ff">Open Source</text>

  <text x="1200" y="616" text-anchor="end" font-family="-apple-system, sans-serif" font-size="13" fill="#444444">github.com/SubhanshuMG/ForgeKit</text>
</svg>
