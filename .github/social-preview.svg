<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <!-- Logomark background gradient -->
    <linearGradient id="mark-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d2137"/>
      <stop offset="100%" stop-color="#060e18"/>
    </linearGradient>

    <!-- Radial glow in top-left -->
    <radialGradient id="glow" cx="15%" cy="20%" r="55%" fx="15%" fy="20%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.05"/>
      <stop offset="60%" stop-color="#00d4ff" stop-opacity="0.015"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>

    <!-- Dot grid pattern -->
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="0.7" fill="#ffffff" opacity="0.03"/>
    </pattern>

    <!-- Terminal window clip for header radius -->
    <clipPath id="terminal-clip">
      <rect x="64" y="280" width="560" height="190" rx="8"/>
    </clipPath>
  </defs>

  <!-- Base background -->
  <rect width="1280" height="640" fill="#0a0a0a"/>

  <!-- Radial glow layer -->
  <rect width="1280" height="640" fill="url(#glow)"/>

  <!-- Dot grid -->
  <rect width="1280" height="640" fill="url(#dots)"/>

  <!-- Left accent bar, 3px, full height -->
  <rect x="0" y="0" width="3" height="640" fill="#00d4ff"/>

  <!-- ==================== LEFT SIDE ==================== -->

  <!-- Logomark: geometric F in rounded square -->
  <rect x="64" y="114" width="46" height="46" rx="9"
        fill="url(#mark-bg)"/>
  <!-- F: vertical bar -->
  <rect x="74" y="124" width="7" height="26" fill="#00d4ff"/>
  <!-- F: top bar -->
  <rect x="74" y="124" width="22" height="6" fill="#00d4ff"/>
  <!-- F: middle bar -->
  <rect x="74" y="133" width="16" height="5" fill="#00d4ff"/>
  <!-- green accent -->
  <rect x="97" y="147" width="5" height="5" fill="#00ff88" rx="1"/>

  <!-- Brand name -->
  <text x="122" y="158"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="56" font-weight="800" fill="#ffffff">ForgeKit</text>

  <!-- Subtitle -->
  <text x="66" y="202"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="14" font-weight="600" fill="#00d4ff"
        letter-spacing="3">ENGINEERING ACCELERATION PLATFORM</text>

  <!-- Horizontal rule -->
  <rect x="64" y="228" width="520" height="1" fill="#1e1e1e"/>

  <!-- Terminal window -->
  <g clip-path="url(#terminal-clip)">
    <!-- Terminal body -->
    <rect x="64" y="280" width="560" height="190" rx="8" fill="#111111"/>

    <!-- Terminal header bar -->
    <rect x="64" y="280" width="560" height="34" fill="#161616"/>

    <!-- Header bottom border -->
    <rect x="64" y="313" width="560" height="1" fill="#1e1e1e"/>
  </g>

  <!-- Terminal border (on top of clip) -->
  <rect x="64" y="280" width="560" height="190" rx="8"
        fill="none" stroke="#1e1e1e" stroke-width="1"/>

  <!-- Traffic light dots -->
  <circle cx="86" cy="297" r="5" fill="#ff5f57"/>
  <circle cx="104" cy="297" r="5" fill="#ffbd2e"/>
  <circle cx="122" cy="297" r="5" fill="#28ca42"/>

  <!-- Terminal title -->
  <text x="160" y="301"
        font-family="'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace"
        font-size="12" fill="#555555">forgekit</text>

  <!-- Terminal line 1: command -->
  <text x="84" y="344"
        font-family="'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace"
        font-size="14" fill="#ffffff">
    <tspan fill="#666666">$ </tspan>npx forgekit-cli new my-app
  </text>

  <!-- Terminal line 2: success -->
  <text x="84" y="374"
        font-family="'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace"
        font-size="13" fill="#00ff88">  &#10004; Project my-app created successfully!</text>

  <!-- Terminal line 3: file count -->
  <text x="84" y="404"
        font-family="'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace"
        font-size="13" fill="#666666">  16 files created in ./my-app</text>

  <!-- Terminal line 4: next step -->
  <text x="84" y="434"
        font-family="'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace"
        font-size="13" fill="#00d4ff">  &#8594; cd my-app &amp;&amp; npm run dev</text>

  <!-- ==================== RIGHT SIDE ==================== -->

  <!-- Section label -->
  <text x="740" y="164"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="11" font-weight="600" fill="#555555"
        letter-spacing="2.5">SCAFFOLD IN SECONDS</text>

  <!-- Feature list -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18">
    <!-- Row 1 -->
    <text x="740" y="210" fill="#00ff88" font-size="16">&#10003;</text>
    <text x="768" y="210" fill="#cccccc">Node.js + React + TypeScript</text>

    <!-- Row 2 -->
    <text x="740" y="248" fill="#00ff88" font-size="16">&#10003;</text>
    <text x="768" y="248" fill="#cccccc">Python + FastAPI + PostgreSQL</text>

    <!-- Row 3 -->
    <text x="740" y="286" fill="#00ff88" font-size="16">&#10003;</text>
    <text x="768" y="286" fill="#cccccc">Python + Jupyter + MLflow</text>

    <!-- Row 4 -->
    <text x="740" y="324" fill="#00ff88" font-size="16">&#10003;</text>
    <text x="768" y="324" fill="#cccccc">CI/CD wired from day one</text>

    <!-- Row 5 -->
    <text x="740" y="362" fill="#00ff88" font-size="16">&#10003;</text>
    <text x="768" y="362" fill="#cccccc">Dockerfile + docker-compose</text>

    <!-- Row 6 -->
    <text x="740" y="400" fill="#00ff88" font-size="16">&#10003;</text>
    <text x="768" y="400" fill="#cccccc">Security sandbox + secret scan</text>
  </g>

  <!-- CLI pill badge -->
  <rect x="740" y="428" width="186" height="30" rx="15"
        fill="#111111" stroke="#00d4ff" stroke-width="1" stroke-opacity="0.5"/>
  <text x="833" y="448" text-anchor="middle"
        font-family="'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace"
        font-size="13" fill="#00d4ff">npx forgekit-cli</text>

  <!-- ==================== BOTTOM BAR ==================== -->

  <!-- Bottom bar background -->
  <rect x="0" y="584" width="1280" height="56" fill="#0d0d0d"/>

  <!-- Bottom bar top border -->
  <rect x="0" y="584" width="1280" height="1" fill="#1e1e1e"/>

  <!-- Badge: Apache 2.0 -->
  <rect x="64" y="600" width="90" height="24" rx="4"
        fill="#1a1a1a" stroke="#262626" stroke-width="1"/>
  <text x="109" y="616" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="11" font-weight="500" fill="#888888">Apache 2.0</text>

  <!-- Badge: TypeScript -->
  <rect x="166" y="600" width="90" height="24" rx="4"
        fill="#1a1a1a" stroke="#262626" stroke-width="1"/>
  <text x="211" y="616" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="11" font-weight="500" fill="#888888">TypeScript</text>

  <!-- Badge: Open Source (accent) -->
  <rect x="268" y="600" width="100" height="24" rx="4"
        fill="rgba(0,212,255,0.06)" stroke="#00d4ff" stroke-width="1" stroke-opacity="0.5"/>
  <text x="318" y="616" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="11" font-weight="600" fill="#00d4ff">Open Source</text>

  <!-- Right: domain -->
  <text x="1216" y="616" text-anchor="end"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="13" fill="#444444">forgekit.build</text>
</svg>
