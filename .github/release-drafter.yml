name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'
categories:
  - title: 'New Features'
    labels: ['feature', 'enhancement']
  - title: 'Bug Fixes'
    labels: ['bug', 'fix']
  - title: 'Documentation'
    labels: ['area/docs']
  - title: 'Security'
    labels: ['area/security']
  - title: 'Templates'
    labels: ['area/templates']
change-template: '- $TITLE @$AUTHOR (#$NUMBER)'
version-resolver:
  major:
    labels: ['breaking-change']
  minor:
    labels: ['feature', 'enhancement']
  patch:
    labels: ['bug', 'fix', 'area/docs', 'area/security']
  default: patch
template: |
  ## Changes

  $CHANGES
